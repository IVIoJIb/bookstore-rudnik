name: CI Pipeline

on:
  [cite_start]pull_request: # Запуск на кожен Pull Request [cite: 79]
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Копіюємо код у віртуальну машину

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install flake8 bandit pytest # Встановлюємо інструменти для перевірки

      - [cite_start]name: Run Linting (Flake8) # Перевірка стилю коду [cite: 82]
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - [cite_start]name: Run Static Analysis (Bandit) # Сканування на вразливості [cite: 83]
        run: bandit -r .

      - [cite_start]name: Run Unit Tests # Запуск твого тесту [cite: 80]
        run: pytest tests/

